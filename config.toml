# Central configuration for the translate_articles project.
#
# All paths are resolved relative to the repository root (the folder that
# contains this file). Use forward slashes; both Windows and POSIX work.
#
# Edit values here instead of changing the scripts. Anything not set falls
# back to the defaults baked into _config.py.

[paths]
# Where to download PDFs from Google Drive, and where the pipeline looks
# for input PDFs.
source_dir       = "to_translate"

# Step 1 output: English Markdown extracted from each PDF.
# Layout: <step1_md_dir>/<basename>/<basename>.md (+ extracted images if any)
step1_md_dir     = "step1_md"

# Translated Markdown output (the new MD-based translation step).
# Layout: <translated_md_dir>/<basename>/<basename>.he.md
# Images stay referenced from step1_md/ so we don't duplicate them.
translated_md_dir = "translated_md"

# Where translated outputs land. For each translated PDF we create
# <translated_dir>/<basename>/ containing the original PDF + the *.he.docx.
translated_dir   = "translated"

# Where PDFs that failed translation are moved to.
error_dir        = "error_translate"

# Durable record of every file we've seen, keyed by SHA-256 so duplicates
# are never re-processed. Stores per-step status (step1, translation, ...).
log_file         = "translation_log.json"

# Auto-generated browseable table.
index_file       = "index.html"

[drive]
# Google Drive folder containing the source PDFs. Used by _download_drive.py.
folder_url       = "https://drive.google.com/drive/folders/1MxUdFWGuc13JEGEZlnCvtPGMzXXRdCh_"

# When true, only files ending in .pdf are downloaded; Google Docs / sheets
# / etc. in the folder are skipped.
pdfs_only        = true

[step1]
# Step 1: extract each PDF to English Markdown via pymupdf4llm.
# When true, embedded images are saved next to the .md file and referenced
# from it (so the markdown looks closer to the source PDF).
extract_images   = true

# Where image files are written (relative to each PDF's step1 folder).
images_subdir    = "images"

# Image DPI for extracted page-fallback images (higher = sharper, larger).
image_dpi        = 150

# When true, paragraphs whose detected language differs from the document's
# main source language are dropped (e.g. the Slovenian abstract in Gopher
# et al. 2001). Short paragraphs (<= 80 chars) and ones containing only
# digits / markdown syntax are kept regardless.
drop_foreign_paragraphs = true

[translation]
# Target language for the translation. "iw" is the legacy Google code for
# Hebrew; "he" also works.
target_language     = "iw"

# Translation backend. Only "google" (free deep_translator backend) is
# implemented today. Other choices are placeholders for future engines
# (e.g. "azure", "openai").
engine              = "google"

# Google Translate caps a single request at ~5000 characters. We chunk
# below that with some headroom for URL-encoding overhead.
chunk_char_limit    = 4500

# How many times to retry a failing translation chunk before giving up on
# the whole document.
retries             = 3

# Initial backoff in seconds between retries; multiplied by attempt number.
retry_backoff_seconds = 2.0

# If true, PDFs whose detected source language is already Hebrew are
# marked "already_hebrew" and only the original is copied to translated/.
skip_already_hebrew = true

[docx]
# Font used for the Hebrew DOCX output.
font_name        = "Arial"
font_size_pt     = 11

[network]
# The corporate proxy on this machine performs TLS inspection with a
# self-signed root. Set to false on machines with a working CA bundle.
disable_tls_verify = true
